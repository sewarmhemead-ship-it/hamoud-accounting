<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="SewarTech">
  <defs>
    <linearGradient id="st-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="st-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="st-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#st-bg)" stroke="rgba(96,165,250,0.35)" stroke-width="2"/>
  <rect x="14" y="14" width="92" height="92" rx="22" fill="none" stroke="url(#st-accent)" stroke-width="2.5" opacity="0.85"/>
  <text x="60" y="52" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#st-accent)" filter="url(#st-glow)">ST</text>
  <text x="60" y="82" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#94a3b8">SEWARTECH</text>
</svg>
