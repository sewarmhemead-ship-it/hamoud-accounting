<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>حمود — محاسبة تخليص</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(circle at 50% 30%, #131826 0%, #090b12 70%);
      color: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .wrap { text-align: center; }
    .logo {
      width: 96px; height: 96px; margin: 0 auto 22px;
      border-radius: 24px;
      background: linear-gradient(135deg, #b8860b, #8a6508);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      box-shadow: 0 8px 30px rgba(184,134,11,0.4);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: #94a3b8; font-size: 14px; margin-bottom: 26px; }
    .spinner {
      width: 38px; height: 38px; margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #b8860b;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .status { margin-top: 18px; color: #64748b; font-size: 12px; }
    .brand { position: absolute; bottom: 22px; width: 100%; text-align: center; color: #475569; font-size: 11px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🏛</div>
    <h1>حمود — محاسبة تخليص</h1>
    <p class="sub">نظام التخليص الجمركي</p>
    <div class="spinner"></div>
    <p class="status">جاري تجهيز البرنامج…</p>
  </div>
  <div class="brand">برمجة وتطوير — SewarTech</div>
</body>
</html>
